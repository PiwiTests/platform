name: Deploy docs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'application/**'
      - '.github/workflows/docs.yml'

  # Allows manual triggering from the Actions tab
  workflow_dispatch:

# Allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build VitePress docs ──────────────────────────────────────────────
      - name: Setup Node (docs)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./docs/package-lock.json

      - name: Install docs dependencies
        working-directory: ./docs
        run: npm ci

      - name: Build docs with VitePress
        working-directory: ./docs
        run: npm run docs:build
        # Output: docs/.vitepress/dist/

      # VitePress generates its own 404.html from the theme, overwriting the
      # file VitePress copied from docs/public/.  Explicitly replace it so
      # GitHub Pages serves our lightweight SPA redirect script instead.
      - name: Override 404.html with SPA redirect
        run: cp docs/public/404.html docs/.vitepress/dist/404.html

      # ── Build Nuxt demo (SPA, deployed at /demo/) ─────────────────────────
      - name: Setup Node (demo)
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ./application/package-lock.json

      - name: Install application dependencies
        working-directory: ./application
        run: npm ci

      - name: Generate static demo site
        working-directory: ./application
        run: npm run app:generate:demo
        env:
          NUXT_PUBLIC_DEMO_MODE: 'true'
        # Output: application/.output/public/

      # ── Combine into a single artifact ────────────────────────────────────
      - name: Copy demo into docs output at /demo/
        run: cp -r application/.output/public docs/.vitepress/dist/demo

      # ── Upload & deploy ───────────────────────────────────────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
