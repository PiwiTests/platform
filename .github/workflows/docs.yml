name: Deploy Docs & Demo

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'application/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build VitePress docs ──────────────────────────────────────────────
      - name: Setup Node (docs)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./docs/package-lock.json

      - name: Install docs dependencies
        working-directory: ./docs
        run: npm ci

      - name: Build docs with VitePress
        working-directory: ./docs
        run: npm run docs:build

      # VitePress generates its own 404.html from the theme, overwriting the
      # file VitePress copied from docs/public/.  Explicitly replace it so
      # GitHub Pages serves our lightweight SPA redirect script instead.
      - name: Override 404.html with SPA redirect
        run: cp docs/public/404.html docs/.vitepress/dist/404.html

      # ── Build Nuxt demo (SPA, deployed at /demo/) ─────────────────────────
      - name: Setup Node (demo)
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ./package-lock.json

      - name: Install application dependencies
        working-directory: .
        run: npm ci

      - name: Generate demo seed data
        working-directory: ./application
        run: npm run app:seed:demo
        env:
          PIWI_DEMO_MODE: 'true'

      - name: Generate OpenAPI spec
        working-directory: ./application
        run: npm run app:gen:spec
        env:
          PIWI_DEMO_MODE: 'true'

      - name: Generate static demo site
        working-directory: ./application
        run: npm run app:generate:demo
        env:
          PIWI_DEMO_MODE: 'true'

      # ── Combine into a single deploy directory ────────────────────────────
      - name: Copy demo into docs output at /demo/
        run: cp -r application/.output/public docs/.vitepress/dist/demo

      # ── Deploy to piwitests.github.io (org-level Pages) ───────────────────
      - name: Deploy to piwitests.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_PAGES_TOKEN }}
          external_repository: piwitests/piwitests.github.io
          publish_branch: main
          publish_dir: docs/.vitepress/dist
          user_name: 'piwitests-bot'
          user_email: 'bot@piwitests.github.io'
