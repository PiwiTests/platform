name: ci

on: pull_request

defaults:
  run:
    working-directory: ./application

jobs:
  ci:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]
        node: [24]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Start MinIO (local S3 server for tests)
        working-directory: .
        run: |
          docker run -d \
            --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data
          # Wait up to 30 s for MinIO to become healthy
          timeout 30 bash -c 'until curl -sf http://localhost:9000/minio/health/live; do sleep 1; done'

      - name: Create S3 test bucket
        working-directory: .
        env:
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
        run: aws --endpoint-url http://localhost:9000 s3 mb s3://playwright-test --region us-east-1

      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: ./application/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Install reporter dependencies
        working-directory: ./reporter
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps --only-shell

      - name: Run Playwright Tests
        env:
          S3_TEST_ENDPOINT: http://localhost:9000
          S3_TEST_BUCKET: playwright-test
          S3_TEST_REGION: us-east-1
          S3_TEST_ACCESS_KEY_ID: minioadmin
          S3_TEST_SECRET_ACCESS_KEY: minioadmin
        run: npm test

  demo-windows:
    name: Demo generate (Windows)
    runs-on: windows-latest

    defaults:
      run:
        working-directory: ./application

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ./application/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run demo-generate tests
        run: npm run test:demo-generate

